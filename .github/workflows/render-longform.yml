name: Render Longform

on:
  workflow_dispatch:
    inputs:
      theme:
        description: "Theme to render"
        required: true
        default: "paper"
        type: choice
        options:
          - paper
          - midnight

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm install

      - name: Build check
        run: npm run build

      - name: Render MP4
        run: |
          mkdir -p out
          if [ "${{ github.event.inputs.theme }}" = "midnight" ]; then
            npx remotion render src/index.ts LongForm5Min-Midnight out/longform-5min-midnight.mp4 --gl=angle
          else
            npx remotion render src/index.ts LongForm5Min-Paper out/longform-5min-paper.mp4 --gl=angle
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rendered-longform-video
          path: out/*.mp4
