name: Render Longform

on:
  workflow_dispatch:
    inputs:
      template:
        description: "Template to render"
        required: true
        default: "paper-depth"
        type: choice
        options:
          - paper-depth
          - editorial-v5
          - app-hybrid-v5
          - structured-flow-v5

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm install

      - name: Build check
        run: npm run build

      - name: Render MP4
        run: |
          mkdir -p out
          TEMPLATE="${{ github.event.inputs.template }}"

          case "$TEMPLATE" in
            "editorial-v5")
              COMPOSITION="ActualEditorialV55Min"
              OUTPUT="out/actual-editorial-v5-5min.mp4"
              EXTRA_ARGS=""
              ;;
            "app-hybrid-v5")
              COMPOSITION="ActualEditorialV55Min"
              OUTPUT="out/actual-app-hybrid-v5-5min.mp4"
              EXTRA_ARGS='--props={"variant":"app-hybrid"}'
              ;;
            "structured-flow-v5")
              COMPOSITION="ActualEditorialV55Min"
              OUTPUT="out/actual-structured-flow-v5-5min.mp4"
              EXTRA_ARGS='--props={"variant":"structured-flow"}'
              ;;
            *)
              COMPOSITION="ActualPaperDepth5Min"
              OUTPUT="out/actual-paper-depth-5min.mp4"
              EXTRA_ARGS=""
              ;;
          esac

          if [ -n "$EXTRA_ARGS" ]; then
            npx remotion render src/index.ts "$COMPOSITION" "$OUTPUT" --gl=angle $EXTRA_ARGS
          else
            npx remotion render src/index.ts "$COMPOSITION" "$OUTPUT" --gl=angle
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rendered-longform-video
          path: out/*.mp4
