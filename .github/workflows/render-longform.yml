name: Render Longform

on:
  workflow_dispatch:
    inputs:
      template:
        description: "Template to render"
        required: true
        default: "paper-depth"
        type: choice
        options:
          - paper-depth
          - editorial-v5

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm install

      - name: Build check
        run: npm run build

      - name: Render MP4
        run: |
          mkdir -p out
          if [ "${{ github.event.inputs.template }}" = "editorial-v5" ]; then
            npx remotion render src/index.ts ActualEditorialV55Min out/actual-editorial-v5-5min.mp4 --gl=angle
          else
            npx remotion render src/index.ts ActualPaperDepth5Min out/actual-paper-depth-5min.mp4 --gl=angle
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rendered-longform-video
          path: out/*.mp4
