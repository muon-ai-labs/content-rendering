name: Render Longform

on:
  workflow_dispatch:
    inputs:
      render_set:
        description: "What to render"
        required: true
        default: "single"
        type: choice
        options:
          - single
          - remaining-8
          - all-10
      template:
        description: "Template to render when render_set=single"
        required: true
        default: "paper-depth"
        type: choice
        options:
          - paper-depth
          - editorial-v5
          - guided-v4
          - app-hybrid-v5
          - structured-flow-v5
          - neo-minimal
          - productivity-canvas
          - documentary-dark
          - soft-tech-finance
          - gamified-learning

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.templates.outputs.matrix }}
    steps:
      - name: Resolve templates
        id: templates
        shell: bash
        run: |
          case "${{ github.event.inputs.render_set }}" in
            "remaining-8")
              JSON='["guided-v4","app-hybrid-v5","structured-flow-v5","neo-minimal","productivity-canvas","documentary-dark","soft-tech-finance","gamified-learning"]'
              ;;
            "all-10")
              JSON='["paper-depth","editorial-v5","guided-v4","app-hybrid-v5","structured-flow-v5","neo-minimal","productivity-canvas","documentary-dark","soft-tech-finance","gamified-learning"]'
              ;;
            *)
              JSON='["${{ github.event.inputs.template }}"]'
              ;;
          esac
          echo "matrix=$JSON" >> "$GITHUB_OUTPUT"

  render:
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.plan.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Render MP4
        shell: bash
        run: |
          mkdir -p out
          TEMPLATE="${{ matrix.template }}"

          case "$TEMPLATE" in
            "editorial-v5")
              COMPOSITION="ActualEditorialV55Min"
              OUTPUT="out/actual-editorial-v5-5min.mp4"
              EXTRA_ARGS=""
              ;;
            "app-hybrid-v5")
              COMPOSITION="ActualEditorialV55Min"
              OUTPUT="out/actual-app-hybrid-v5-5min.mp4"
              EXTRA_ARGS='--props={"variant":"app-hybrid"}'
              ;;
            "guided-v4")
              COMPOSITION="ActualEditorialV55Min"
              OUTPUT="out/actual-guided-v4-5min.mp4"
              EXTRA_ARGS='--props={"variant":"guided"}'
              ;;
            "structured-flow-v5")
              COMPOSITION="ActualEditorialV55Min"
              OUTPUT="out/actual-structured-flow-v5-5min.mp4"
              EXTRA_ARGS='--props={"variant":"structured-flow"}'
              ;;
            "neo-minimal")
              COMPOSITION="ActualEditorialV55Min"
              OUTPUT="out/actual-neo-minimal-5min.mp4"
              EXTRA_ARGS='--props={"variant":"neo-minimal"}'
              ;;
            "productivity-canvas")
              COMPOSITION="ActualEditorialV55Min"
              OUTPUT="out/actual-productivity-canvas-5min.mp4"
              EXTRA_ARGS='--props={"variant":"productivity-canvas"}'
              ;;
            "documentary-dark")
              COMPOSITION="ActualEditorialV55Min"
              OUTPUT="out/actual-documentary-dark-5min.mp4"
              EXTRA_ARGS='--props={"variant":"documentary-dark"}'
              ;;
            "soft-tech-finance")
              COMPOSITION="ActualEditorialV55Min"
              OUTPUT="out/actual-soft-tech-finance-5min.mp4"
              EXTRA_ARGS='--props={"variant":"soft-tech-finance"}'
              ;;
            "gamified-learning")
              COMPOSITION="ActualEditorialV55Min"
              OUTPUT="out/actual-gamified-learning-5min.mp4"
              EXTRA_ARGS='--props={"variant":"gamified-learning"}'
              ;;
            *)
              COMPOSITION="ActualPaperDepth5Min"
              OUTPUT="out/actual-paper-depth-5min.mp4"
              EXTRA_ARGS=""
              ;;
          esac

          if [ -n "$EXTRA_ARGS" ]; then
            npx remotion render src/index.ts "$COMPOSITION" "$OUTPUT" --gl=angle $EXTRA_ARGS
          else
            npx remotion render src/index.ts "$COMPOSITION" "$OUTPUT" --gl=angle
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rendered-${{ matrix.template }}
          path: out/*.mp4
          compression-level: 0
